<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Subtle gradient for the background circle -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <!-- Shine effect on the bar -->
    <linearGradient id="barShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Rounded bar clip path -->
    <clipPath id="barClip">
      <rect x="40" y="96" width="176" height="36" rx="18" ry="18"/>
    </clipPath>
  </defs>

  <!-- Background: rounded square -->
  <rect width="256" height="256" rx="56" ry="56" fill="url(#bgGrad)"/>

  <!-- Outer bar track (subtle dark inset) -->
  <rect x="38" y="94" width="180" height="40" rx="20" ry="20" fill="#000000" fill-opacity="0.3"/>

  <!-- Bar background (track) -->
  <rect x="40" y="96" width="176" height="36" rx="18" ry="18" fill="#334155"/>

  <!-- Segmented bar segments (clipped to pill shape) -->
  <g clip-path="url(#barClip)">
    <!-- Done segment: green — 45% -->
    <rect x="40" y="96" width="79" height="36" fill="#4ade80"/>
    <!-- Doing segment: blue — 20% -->
    <rect x="119" y="96" width="36" height="36" fill="#60a5fa"/>
    <!-- In Review segment: yellow — 10% -->
    <rect x="155" y="96" width="18" height="36" fill="#facc15"/>
    <!-- Remaining (Todo): stays as track color #334155 -->

    <!-- Shine overlay -->
    <rect x="40" y="96" width="176" height="18" fill="url(#barShine)"/>
  </g>

  <!-- Percentage text -->
  <text x="128" y="164" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" fill="#94a3b8" letter-spacing="1">
    45%
  </text>

  <!-- Small decorative dots representing tasks -->
  <g fill="#64748b" opacity="0.5">
    <circle cx="88" cy="72" r="3"/>
    <circle cx="104" cy="72" r="3"/>
    <circle cx="120" cy="72" r="3"/>
    <circle cx="136" cy="72" r="3"/>
    <circle cx="152" cy="72" r="3"/>
    <circle cx="168" cy="72" r="3"/>
  </g>
  <!-- Completed task dots (green) -->
  <g fill="#4ade80" opacity="0.7">
    <circle cx="88" cy="72" r="3"/>
    <circle cx="104" cy="72" r="3"/>
    <circle cx="120" cy="72" r="3"/>
  </g>
</svg>
