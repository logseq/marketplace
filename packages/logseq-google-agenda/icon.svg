<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#4285F4"/>
  <!-- Calendar body -->
  <rect x="30" y="38" width="68" height="58" rx="6" fill="#fff"/>
  <!-- Calendar top bar -->
  <rect x="30" y="38" width="68" height="16" rx="6" fill="#EA4335"/>
  <rect x="30" y="48" width="68" height="6" fill="#EA4335"/>
  <!-- Calendar hooks -->
  <rect x="46" y="32" width="4" height="14" rx="2" fill="#fff"/>
  <rect x="78" y="32" width="4" height="14" rx="2" fill="#fff"/>
  <!-- Grid lines -->
  <line x1="30" y1="68" x2="98" y2="68" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="30" y1="80" x2="98" y2="80" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="53" y1="54" x2="53" y2="96" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="75" y1="54" x2="75" y2="96" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Google-colored dots for events -->
  <circle cx="42" cy="62" r="3" fill="#4285F4"/>
  <circle cx="64" cy="62" r="3" fill="#FBBC04"/>
  <circle cx="86" cy="74" r="3" fill="#34A853"/>
  <circle cx="42" cy="86" r="3" fill="#EA4335"/>
  <circle cx="64" cy="86" r="3" fill="#4285F4"/>
</svg>
