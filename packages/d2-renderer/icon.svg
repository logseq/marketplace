<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Node A -->
  <rect x="4" y="4" width="20" height="14" rx="3" fill="#4A90D9" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="14" y="14" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">A</text>
  <!-- Node B -->
  <rect x="40" y="4" width="20" height="14" rx="3" fill="#4A90D9" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="50" y="14" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">B</text>
  <!-- Node C -->
  <rect x="22" y="46" width="20" height="14" rx="3" fill="#4A90D9" stroke="#2C5F8A" stroke-width="1.5"/>
  <text x="32" y="56" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">C</text>
  <!-- Edge A -> B -->
  <line x1="24" y1="11" x2="40" y2="11" stroke="#2C5F8A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Edge A -> C -->
  <line x1="14" y1="18" x2="28" y2="46" stroke="#2C5F8A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Edge B -> C -->
  <line x1="50" y1="18" x2="36" y2="46" stroke="#2C5F8A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2C5F8A"/>
    </marker>
  </defs>
</svg>
