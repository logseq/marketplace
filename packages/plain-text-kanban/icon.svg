<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
  <!-- Plugin Icon Background (Dark Mode Theme) -->
  <rect width="100" height="100" rx="22" fill="#1E1E1E" />
  
  <!-- Column 1: Plain Text List on the Left -->
  <g stroke="#D4D4D4" stroke-width="4" stroke-linecap="round">
    <line x1="14" y1="28" x2="30" y2="28" />
    <line x1="14" y1="42" x2="26" y2="42" />
    <line x1="14" y1="56" x2="30" y2="56" />
    <line x1="14" y1="70" x2="22" y2="70" />
    <line x1="14" y1="84" x2="28" y2="84" />
  </g>

  <!-- Central Vertical Split Line (Splitting the icon exactly in half) -->
  <line x1="50" y1="12" x2="50" y2="88" stroke="#555555" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 4" />

  <!-- Column 2 (Left Half): Stylized Text Lines -->
  <g stroke="#D4D4D4" stroke-width="3" stroke-linecap="round">
    <line x1="36" y1="30" x2="46" y2="30" />
    <line x1="36" y1="44" x2="42" y2="44" />
    <line x1="36" y1="58" x2="46" y2="58" />
    <line x1="36" y1="72" x2="40" y2="72" />
  </g>

  <!-- Column 2 (Right Half): Stylized Kanban Cards -->
  <g fill="#8B5CF6">
    <rect x="54" y="26" width="10" height="14" rx="2" />
    <rect x="54" y="46" width="10" height="20" rx="2" />
    <rect x="54" y="72" width="10" height="12" rx="2" />
  </g>

  <!-- Column 3: Full Kanban Board Column on the Right -->
  <g fill="#8B5CF6">
    <rect x="72" y="26" width="14" height="20" rx="3" />
    <rect x="72" y="52" width="14" height="30" rx="3" />
  </g>
</svg>